<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Son Nguyen Quoc — Senior Game Designer</title>
<style>
  /* ============================================================
     THEME
     ============================================================ */
  :root {
    --bg-1: #0d0f1a;
    --bg-2: #151a2e;
    --felt-1: #101528;
    --felt-2: #0a0d1c;
    --gold: #d4af6a;
    --gold-soft: rgba(212, 175, 106, 0.35);
    --ink: #e8e6df;
    --ink-dim: #9a97a8;
    --card-w: 150px;
    --card-h: 215px;
    --card-radius: 12px;
    --font-display: Georgia, 'Times New Roman', serif;
    --font-body: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: var(--font-body);
    background:
      radial-gradient(1200px 700px at 50% -10%, #1c2340 0%, transparent 60%),
      radial-gradient(900px 500px at 85% 110%, #251a33 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2));
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
  }

  /* faint starfield */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .stars span {
    position: absolute;
    width: 2px; height: 2px; border-radius: 50%;
    background: rgba(255,255,255,0.5);
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.7; }
  }

  /* ============================================================
     HEADER
     ============================================================ */
  header {
    position: relative; z-index: 5;
    text-align: center;
    padding: 26px 20px 6px;
  }
  header h1 {
    font-family: var(--font-display);
    font-size: clamp(26px, 4vw, 40px);
    letter-spacing: 3px;
    font-weight: 400;
  }
  header h1 .accent { color: var(--gold); }
  header .tagline {
    margin-top: 6px;
    color: var(--ink-dim);
    font-size: clamp(12px, 1.5vw, 15px);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  header .links {
    margin-top: 10px;
    display: flex; gap: 18px; justify-content: center;
    font-size: 13px;
  }
  header .links a {
    color: var(--ink-dim); text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
    transition: color .2s, border-color .2s;
  }
  header .links a:hover { color: var(--gold); border-color: var(--gold-soft); }

  /* ============================================================
     TABLE / DROP FIELD
     ============================================================ */
  .table-area {
    position: relative; z-index: 2;
    height: calc(100vh - 130px - 260px); /* header ~130, hand ~260 */
    height: calc(100dvh - 130px - 260px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 4vw;
  }

  .field {
    position: relative;
    width: min(980px, 100%);
    height: 100%;
    max-height: 480px;
    border-radius: 22px;
    background:
      radial-gradient(ellipse at 50% 40%, var(--felt-1), var(--felt-2) 85%);
    border: 2px dashed rgba(212, 175, 106, 0.25);
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.55),
      0 10px 40px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .25s, box-shadow .25s, background .25s;
  }
  .field.highlight {
    border-color: var(--gold);
    box-shadow:
      inset 0 0 80px rgba(212, 175, 106, 0.12),
      0 0 45px rgba(212, 175, 106, 0.18),
      0 10px 40px rgba(0,0,0,0.4);
  }

  .field-hint {
    text-align: center;
    color: var(--ink-dim);
    pointer-events: none;
    transition: opacity .3s;
  }
  .field-hint .glyph {
    font-size: 44px;
    opacity: .55;
    display: block;
    margin-bottom: 12px;
    animation: floaty 3s ease-in-out infinite;
  }
  @keyframes floaty {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-9px); }
  }
  .field-hint .msg {
    font-family: var(--font-display);
    font-size: clamp(15px, 2vw, 20px);
    letter-spacing: 1.5px;
  }
  .field-hint .sub {
    margin-top: 6px;
    font-size: 12.5px;
    letter-spacing: 1px;
    opacity: .7;
  }
  .field.occupied .field-hint { opacity: 0; }

  /* ---------- active project banner (task mode) ---------- */
  .project-banner {
    position: absolute;
    top: 12px; left: 50%;
    transform: translate(-50%, -180%);
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: calc(100% - 32px);
    padding: 8px 10px 8px 8px;
    background: rgba(8, 10, 22, 0.72);
    border: 1px solid var(--gold-soft);
    border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    z-index: 6;
    opacity: 0;
    pointer-events: none;
    transition: transform .5s cubic-bezier(.3, .8, .3, 1.1), opacity .35s;
  }
  .field.task-mode .project-banner {
    transform: translate(-50%, 0);
    opacity: 1;
    pointer-events: auto;
  }
  .pb-thumb {
    width: 58px; height: 36px;
    border-radius: 7px;
    overflow: hidden;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    border: 1px solid rgba(212, 175, 106, 0.35);
  }
  .pb-thumb img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .pb-info { min-width: 0; }
  .pb-title {
    font-family: var(--font-display);
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pb-sub {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: .85;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pb-back {
    flex-shrink: 0;
    padding: 7px 13px;
    font-size: 11px;
  }
  .field.task-mode .showcase { padding-top: 68px; }
  @media (max-width: 760px) {
    .pb-title { font-size: 12.5px; }
    .pb-thumb { width: 44px; height: 28px; font-size: 15px; }
    .field.task-mode .showcase { padding-top: 76px; }
  }

  /* ---------- played card + detail sheet ---------- */
  .showcase {
    position: absolute; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(18px, 3.5vw, 44px);
    padding: clamp(14px, 3vw, 34px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .35s ease .1s;
  }
  .field.occupied .showcase { opacity: 1; pointer-events: auto; }

  .played-slot { perspective: 1100px; flex-shrink: 0; }

  .played-card {
    width: clamp(150px, 19vw, 205px);
    aspect-ratio: 150 / 215;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .6s cubic-bezier(.4, .1, .2, 1);
    transform: rotateY(180deg);
  }
  .field.occupied .played-card.flipped { transform: rotateY(0deg); }

  .played-card .face {
    position: absolute; inset: 0;
    border-radius: var(--card-radius);
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }
  .played-card .face.back { transform: rotateY(180deg); }

  .detail {
    max-width: 480px;
    min-width: 0;
    animation: detailIn .5s ease .35s both;
  }
  @keyframes detailIn {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .detail .kicker {
    font-size: 11.5px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .detail h2 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(22px, 3vw, 32px);
    margin-bottom: 10px;
  }
  .detail p {
    color: var(--ink-dim);
    font-size: clamp(13px, 1.5vw, 14.5px);
    line-height: 1.65;
    margin-bottom: 14px;
  }
  .detail .tags {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 18px;
  }
  .detail .tags span {
    font-size: 11.5px;
    letter-spacing: 0.5px;
    padding: 4px 11px;
    border: 1px solid var(--gold-soft);
    border-radius: 999px;
    color: var(--gold);
  }
  .detail .actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    font-family: var(--font-body);
    font-size: 12.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform .15s, box-shadow .2s, background .2s;
  }
  .btn:active { transform: scale(.96); }
  .btn-primary {
    background: linear-gradient(160deg, #e3c17e, #b8924e);
    border: none;
    color: #1a1408;
    font-weight: 600;
  }
  .btn-primary:hover { box-shadow: 0 4px 20px rgba(212, 175, 106, 0.35); }
  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(232, 230, 223, 0.25);
    color: var(--ink-dim);
  }
  .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

  /* ============================================================
     CARD (shared front/back visuals)
     ============================================================ */
  .card-back-design {
    width: 100%; height: 100%;
    border-radius: var(--card-radius);
    background:
      repeating-linear-gradient(45deg,
        rgba(212,175,106,0.07) 0 2px, transparent 2px 11px),
      repeating-linear-gradient(-45deg,
        rgba(212,175,106,0.07) 0 2px, transparent 2px 11px),
      linear-gradient(160deg, #1e2440, #131730);
    border: 2px solid rgba(212, 175, 106, 0.45);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .card-back-design::before {
    content: '';
    position: absolute; inset: 9px;
    border: 1px solid rgba(212, 175, 106, 0.3);
    border-radius: calc(var(--card-radius) - 5px);
  }
  .card-back-design .emblem {
    font-family: var(--font-display);
    font-size: 30px;
    color: var(--gold);
    opacity: .85;
  }

  .card-front-design {
    width: 100%; height: 100%;
    border-radius: var(--card-radius);
    border: 2px solid rgba(212, 175, 106, 0.5);
    background: linear-gradient(175deg, #232a4a 0%, #161b33 60%, #10142a 100%);
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .card-front-design .art {
    flex: 1.25;
    margin: 8px 8px 0;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 42px;
    position: relative;
    overflow: hidden;
  }
  .card-front-design .art::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.35));
  }
  .card-front-design .art img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .card-front-design .label {
    flex: 1;
    padding: 9px 10px 10px;
    display: flex; flex-direction: column; justify-content: center;
    text-align: center;
  }
  .card-front-design .label .name {
    font-family: var(--font-display);
    font-size: 14.5px;
    letter-spacing: 0.5px;
    color: var(--ink);
    line-height: 1.25;
  }
  .card-front-design .label .type {
    margin-top: 5px;
    font-size: 9.5px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--gold);
    opacity: .85;
  }
  .card-front-design .corner {
    position: absolute; top: 6px; left: 8px;
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--gold);
    opacity: .9;
    text-shadow: 0 1px 3px rgba(0,0,0,.6);
    z-index: 2;
  }

  /* ============================================================
     HAND
     ============================================================ */
  .hand-area {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 260px;
    z-index: 10;
    pointer-events: none;
  }
  .hand {
    position: absolute;
    bottom: 32px;
    left: 50%;
    width: 0;
    height: 0;
  }
  .hand-hint {
    position: absolute;
    bottom: 262px;
    width: 100%;
    text-align: center;
    font-size: 11.5px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-dim);
    opacity: .8;
    pointer-events: none;
    transition: opacity .3s;
  }

  .card {
    position: absolute;
    width: var(--card-w);
    height: var(--card-h);
    left: calc(var(--card-w) / -2);
    bottom: 0;
    cursor: grab;
    pointer-events: auto;
    transform-origin: 50% 120%;
    transition: transform .35s cubic-bezier(.3, .9, .35, 1.15), filter .25s;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
    touch-action: none;
    border-radius: var(--card-radius);
  }
  .card:hover, .card:focus-visible {
    filter: drop-shadow(0 14px 26px rgba(0,0,0,0.65)) brightness(1.12);
    z-index: 50 !important;
  }
  .card:focus-visible {
    outline: 2px solid var(--gold);
    outline-offset: 3px;
  }
  .card.dragging {
    position: fixed;
    left: 0; top: 0; bottom: auto;
    margin: 0;
    transition: none;
    cursor: grabbing;
    z-index: 999 !important;
    transform-origin: 50% 50%;
    filter: drop-shadow(0 22px 40px rgba(0,0,0,0.7)) brightness(1.1);
  }
  .card.returning {
    transition: transform .45s cubic-bezier(.3, .8, .3, 1.1);
  }
  .card.in-play {
    display: none;
  }
  .card.dealt-in {
    animation: dealIn .5s cubic-bezier(.25, .8, .3, 1.1) both;
  }
  @keyframes dealIn {
    from {
      transform: translate(40vw, -55vh) rotate(50deg) scale(.6);
      opacity: 0;
    }
  }

  /* ============================================================
     RESPONSIVE
     ============================================================ */
  @media (max-width: 760px) {
    :root { --card-w: 104px; --card-h: 150px; }
    html, body { overflow-y: auto; }
    header { padding-top: 18px; }
    .hand-area { height: 192px; }
    .hand { bottom: 26px; }
    .hand-hint { bottom: 186px; font-size: 10px; }
    .table-area {
      height: calc(100vh - 118px - 192px);
      height: calc(100dvh - 118px - 192px);
      min-height: 360px;
      padding: 8px 12px;
    }
    .field { max-height: none; }
    .showcase {
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      justify-content: flex-start;
      padding-top: 18px;
    }
    .played-card { width: 118px; }
    .detail { text-align: center; }
    .detail .tags, .detail .actions { justify-content: center; }
    .card-front-design .art { font-size: 30px; }
    .card-front-design .label .name { font-size: 11px; }
    .card-front-design .label .type { font-size: 8px; letter-spacing: 1.2px; }
  }
</style>
</head>

/* ============================================================== */

const hand      = document.getElementById('hand');
const field     = document.getElementById('field');
const showcase  = document.getElementById('showcase');
const playedCard  = document.getElementById('playedCard');
const playedFront = document.getElementById('playedFront');
const detail    = document.getElementById('detail');
const handHint  = document.getElementById('handHint');
const fieldMsg  = document.getElementById('fieldMsg');
const fieldSub  = document.getElementById('fieldSub');
const pbThumb   = document.getElementById('pbThumb');
const pbTitle   = document.getElementById('pbTitle');
const pbSub     = document.getElementById('pbSub');
const pbBack    = document.getElementById('pbBack');

let activeCardId = null;      // card currently on the table
let mode = 'projects';        // 'projects' | 'tasks'
let taskProject = null;       // project whose tasks are in the hand
let taskCards = [];           // generated task-card list for taskProject

function currentCards() {
  return mode === 'projects' ? PROJECTS : taskCards;
}

/* ---------- starfield ---------- */
(() => {
  const stars = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('span');
    s.style.left = (i * 37 % 100) + '%';
    s.style.top  = (i * 53 % 100) + '%';
    s.style.animationDelay = (i % 10) * 0.4 + 's';
    s.style.opacity = 0.2 + (i % 5) * 0.1;
    stars.appendChild(s);
  }
})();

/* ---------- card front markup (shared by hand + table) ---------- */
function cardFrontHTML(p) {
  // referrerpolicy=no-referrer: some game sites (e.g. bloodloop.com) 403 hotlinked
  // requests that carry a foreign Referer header
  let artContent = p.art;
  if (p.img && p.img2) {
    artContent =
      `<img src="${p.img}" alt="${p.title} key art" draggable="false" referrerpolicy="no-referrer" style="width:50%; right:auto">` +
      `<img src="${p.img2}" alt="" draggable="false" referrerpolicy="no-referrer" style="width:50%; left:auto; right:0">`;
  } else if (p.img) {
    artContent = `<img src="${p.img}" alt="${p.title} key art" draggable="false" referrerpolicy="no-referrer">`;
  }
  return `
    <div class="card-front-design">
      <span class="corner">✦</span>
      <div class="art" style="background:${p.artBg}">${artContent}</div>
      <div class="label">
        <div class="name">${p.title}</div>
        <div class="type">${p.type}</div>
      </div>
    </div>`;
}

/* ---------- build hand (projects or tasks, depending on mode) ---------- */
function buildHand() {
  hand.innerHTML = '';
  currentCards().forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'card dealt-in';
    el.dataset.cardId = p.id;
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', 'Play card: ' + p.title);
    el.innerHTML = cardFrontHTML(p);
    el.style.animationDelay = (i * 0.09) + 's';
    hand.appendChild(el);
    attachDrag(el);
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); playCard(p.id); }
    });
  });
  layoutHand();
}

/* fan the cards; the card being dragged (skipEl) keeps its drag transform */
function layoutHand(skipEl) {
  const cards = [...hand.children].filter(c => !c.classList.contains('in-play'));
  const n = cards.length;
  cards.forEach((el, i) => {
    el.style.zIndex = 10 + i;
    if (el === skipEl || el.classList.contains('dragging')) return;
    const t = n === 1 ? 0 : (i / (n - 1)) - 0.5;   // -0.5 … 0.5
    const spread = Math.min(30, n * 7);              // total degrees
    const cardW  = el.offsetWidth || 150;
    // cap the fan's total width to the viewport so it fits phone screens
    const maxSpan = Math.max(140, window.innerWidth * 0.94 - cardW);
    const gap    = Math.min(120, 900 / n, maxSpan / (n * 0.55));
    const rot  = t * spread;
    const x    = t * gap * n * 0.55;
    const lift = Math.abs(t) * Math.abs(t) * 320;    // arc dip at edges
    el.style.transform = `translate(${x}px, ${lift * 0.18}px) rotate(${rot}deg)`;
    el.dataset.homeTransform = el.style.transform;
  });
}

/* ---------- drag logic (pointer events: mouse + touch) ---------- */
function attachDrag(el) {
  let startX = 0, startY = 0, moved = false, grabDX = 0, grabDY = 0;

  el.addEventListener('pointerdown', e => {
    if (activeDragEl) return;
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    startX = e.clientX; startY = e.clientY;
    moved = false;
    const r = el.getBoundingClientRect();
    grabDX = e.clientX - r.left;
    grabDY = e.clientY - r.top;
  });

  el.addEventListener('pointermove', e => {
    if (!el.hasPointerCapture(e.pointerId)) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (!moved && Math.hypot(dx, dy) > 8) {
      moved = true;
      beginDrag(el);
    }
    if (moved) moveDrag(el, e.clientX - grabDX, e.clientY - grabDY, e.clientX, e.clientY);
  });

  el.addEventListener('pointerup', e => {
    if (el.hasPointerCapture(e.pointerId)) el.releasePointerCapture(e.pointerId);
    if (moved) {
      endDrag(el, e.clientX, e.clientY);
    } else {
      playCard(el.dataset.cardId);   // simple click/tap
    }
    moved = false;
  });

  el.addEventListener('pointercancel', () => {
    if (activeDragEl === el) returnToHand(el);
    moved = false;
  });
}

let activeDragEl = null;

function beginDrag(el) {
  activeDragEl = el;
  el.classList.remove('dealt-in', 'returning');
  el.classList.add('dragging');
  handHint.style.opacity = 0;
}

function moveDrag(el, x, y, px, py) {
  el.style.transform = `translate(${x}px, ${y}px) rotate(4deg)`;
  const over = pointInRect(px, py, field.getBoundingClientRect());
  field.classList.toggle('highlight', over);
}

function endDrag(el, px, py) {
  field.classList.remove('highlight');
  const over = pointInRect(px, py, field.getBoundingClientRect());
  if (over) {
    el.classList.remove('dragging');
    el.style.transform = '';
    activeDragEl = null;
    playCard(el.dataset.cardId);
  } else {
    returnToHand(el);
  }
}

function returnToHand(el) {
  activeDragEl = null;
  el.classList.remove('dragging');
  el.classList.add('returning');
  el.style.transform = el.dataset.homeTransform || '';
  handHint.style.opacity = '';
  setTimeout(() => el.classList.remove('returning'), 500);
  layoutHand();
}

function pointInRect(x, y, r) {
  return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
}

/* ---------- play a card onto the table ---------- */
function playCard(cardId) {
  const p = currentCards().find(c => c.id === cardId);
  if (!p) return;

  // return any card already on the table to the hand
  if (activeCardId) restoreHandCard(activeCardId);
  activeCardId = cardId;

  // hide it in the hand
  const handCard = hand.querySelector(`[data-card-id="${cardId}"]`);
  if (handCard) handCard.classList.add('in-play');
  layoutHand();

  // fill the table card + detail sheet
  playedFront.innerHTML = cardFrontHTML(p);
  if (mode === 'projects') {
    detail.innerHTML = `
      <div class="kicker">${p.type} · ${p.year}</div>
      <h2>${p.title}</h2>
      <p>${p.description}</p>
      <div class="tags">${p.tags.map(t => `<span>${t}</span>`).join('')}</div>
      <div class="actions">
        ${p.tasks && p.tasks.length ? `<button class="btn btn-primary" id="playBtn">▶ Play — My Tasks</button>` : ''}
        ${p.link ? `<a class="btn btn-ghost" href="${p.link}" target="_blank" rel="noopener">${p.linkLabel}</a>` : ''}
        ${p.link2 ? `<a class="btn btn-ghost" href="${p.link2}" target="_blank" rel="noopener">${p.link2Label}</a>` : ''}
        <button class="btn btn-ghost" id="returnBtn">Return to hand</button>
      </div>`;
    const playBtn = detail.querySelector('#playBtn');
    if (playBtn) playBtn.addEventListener('click', () => enterTaskMode(p));
  } else {
    detail.innerHTML = `
      <div class="kicker">${taskProject.title} · ${taskProject.year}</div>
      <h2>${p.title}</h2>
      <p>${p.description}</p>
      <div class="actions">
        <button class="btn btn-ghost" id="returnBtn">Return to hand</button>
        <button class="btn btn-ghost" id="allProjectsBtn">◂ All Projects</button>
      </div>`;
    detail.querySelector('#allProjectsBtn').addEventListener('click', exitTaskMode);
  }
  detail.querySelector('#returnBtn').addEventListener('click', clearTable);

  // flip animation: show back first, then flip to front
  playedCard.classList.remove('flipped');
  field.classList.add('occupied');
  requestAnimationFrame(() =>
    requestAnimationFrame(() => playedCard.classList.add('flipped'))
  );
}

function restoreHandCard(cardId) {
  const c = hand.querySelector(`[data-card-id="${cardId}"]`);
  if (c) c.classList.remove('in-play');
}

function clearTable() {
  if (activeCardId) restoreHandCard(activeCardId);
  activeCardId = null;
  field.classList.remove('occupied');
  playedCard.classList.remove('flipped');
  handHint.style.opacity = '';
  layoutHand();
}

/* ---------- task mode: project card moves to the top, hand re-deals as tasks ---------- */
function enterTaskMode(project) {
  taskProject = project;
  taskCards = project.tasks.map((t, i) => ({
    ...t,
    id: project.id + '::task-' + i,
    type: 'Task ' + (i + 1) + ' of ' + project.tasks.length,
    artBg: project.artBg
  }));
  mode = 'tasks';
  clearTable();

  // banner = the played project card, now sitting at the top of the field
  pbThumb.innerHTML = p_bannerArt(project);
  pbTitle.textContent = project.title;
  pbSub.textContent = project.type + ' · ' + project.year;
  field.classList.add('task-mode');

  fieldMsg.textContent = 'Drag a task card onto the table';
  fieldSub.textContent = '— what I did on ' + project.title + ' —';
  handHint.textContent = 'Task cards — pick one';
  buildHand();
}

function p_bannerArt(project) {
  if (project.img && project.img2) {
    return `<img src="${project.img}" alt="" referrerpolicy="no-referrer" style="width:50%">` +
           `<img src="${project.img2}" alt="" referrerpolicy="no-referrer" style="width:50%">`;
  }
  if (project.img) return `<img src="${project.img}" alt="" referrerpolicy="no-referrer">`;
  return `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:${project.artBg}">${project.art}</div>`;
}

function exitTaskMode() {
  mode = 'projects';
  taskProject = null;
  taskCards = [];
  clearTable();
  field.classList.remove('task-mode');
  fieldMsg.textContent = 'Drag a card onto the table';
  fieldSub.textContent = '— or click a card to play it —';
  handHint.textContent = 'Your hand — pick a project';
  buildHand();
}

pbBack.addEventListener('click', exitTaskMode);

/* Esc: clear the table first; if the table is already clear, leave task mode */
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  if (field.classList.contains('occupied')) clearTable();
  else if (mode === 'tasks') exitTaskMode();
});

buildHand();
window.addEventListener('resize', () => layoutHand());
</script>
